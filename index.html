<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語彙カード／読みクイズ</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--sub:#6b7280;--accent:#2563eb;--border:#dbe3f0;--soft:#f8fbff;--ok:#15803d;--ng:#b91c1c}
    *{box-sizing:border-box} body{margin:0;font-family:"Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .wrap{max-width:960px;margin:0 auto;padding:20px}.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.06);padding:22px;margin-bottom:18px}
    h1,h2{margin-top:0}.sub{color:var(--sub);font-size:.98rem}.tabs,.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button,input,select{font:inherit}.tabBtn,button{border:none;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700}.tabBtn.active,.primary{background:var(--accent);color:#fff}.tabBtn:not(.active),.secondary{background:#e5ecf8;color:#1e3a8a}.ghost{background:#eef2f7;color:#334155}
    .panel{display:block}.hidden{display:none !important}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.vocabGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}@media(max-width:700px){.grid,.vocabGrid{grid-template-columns:1fr}.question{font-size:2rem}}
    label{display:block;font-weight:700;margin-bottom:6px} input,select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:#fff}
    .vocabItem{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:#fff}.vocabHeader{width:100%;text-align:left;background:var(--soft);color:var(--text);border-radius:0;padding:16px;display:flex;justify-content:space-between;align-items:center;font-size:1.1rem}.vocabHeader span:last-child{color:var(--sub);font-size:.95rem}
    .vocabBody{display:none;padding:16px;border-top:1px solid var(--border)}.vocabItem.open .vocabBody{display:block}.meaningBlock{margin-bottom:10px}.meaningLabel{font-weight:700;color:#1e3a8a;margin-bottom:2px}
    .meta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;color:var(--sub);font-size:.95rem}.questionBox{text-align:center;padding:16px 10px;background:#f8fbff;border:1px solid #dceaff;border-radius:18px;margin:18px 0}.questionLabel{color:var(--sub);font-size:.95rem;margin-bottom:8px}.question{font-size:2.5rem;font-weight:800;letter-spacing:.06em}
    .feedback{margin-top:14px;padding:14px;border-radius:14px;font-weight:700;display:none}.ok{background:#ecfdf3;color:var(--ok);border:1px solid #bbf7d0;display:block}.ng{background:#fef2f2;color:var(--ng);border:1px solid #fecaca;display:block}.score{font-size:1.2rem;font-weight:800;margin:6px 0 10px}.resultList{padding-left:1.2em}.muted{color:var(--sub);font-size:.92rem}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>語彙カード／読みクイズ　　日本語2（応用日本語）</h1>
    <div class="sub">語彙をタップすると、読み方と意味が開きます。下のタブで読みクイズにも切り替えられます。</div>
    <div class="tabs">
      <button class="tabBtn active" data-target="vocabPanel">語彙を見る</button>
      <button class="tabBtn" data-target="quizPanel">読みクイズをする</button>
    </div>
  </div>

  <div class="panel" id="vocabPanel">
    <div class="card">
      <h2>語彙カード</h2>
      <div class="sub">単語をタップすると、読み・やさしい日本語・中国語・ベトナム語・英語が表示されます。</div>
      <label for="searchInput">語彙検索</label>
      <input id="searchInput" type="text" placeholder="漢字・読み・意味で検索" />
      <div class="controls">
        <button class="secondary" id="openAllBtn">全部ひらく</button>
        <button class="ghost" id="closeAllBtn">全部とじる</button>
      </div>
      <div class="vocabGrid" id="vocabGrid"></div>
    </div>
  </div>

  <div class="panel hidden" id="quizPanel">
    <div class="card">
      <h2>読みクイズ</h2>
      <div class="grid">
        <div><label for="studentId">学籍番号</label><input id="studentId" type="text" placeholder="例：20260001" /></div>
        <div><label for="studentName">名前</label><input id="studentName" type="text" placeholder="例：すずき はなこ" /></div>
      </div>
      <div class="grid" style="margin-top:12px;">
        <div><label for="questionCount">問題数</label><select id="questionCount"><option value="10">10問</option><option value="20">20問</option><option value="50">50問</option></select></div>
        <div><label for="mode">出題方法</label><select id="mode"><option value="random">ランダム</option><option value="fixed">1番から順番</option></select></div>
      </div>
      <div class="controls"><button class="primary" id="startBtn">はじめる</button></div>
    </div>

    <div class="card hidden" id="quizCard">
      <div class="meta"><div id="studentInfo">学籍番号：　／　名前：</div><div id="progress">第1問</div></div>
      <div class="questionBox"><div class="questionLabel">次のことばの読みを、ひらがなで答えましょう。</div><div class="question" id="questionText">展望</div></div>
      <label for="answerInput">こたえ</label><input id="answerInput" type="text" placeholder="ひらがなで入力" autocomplete="off" />
      <div class="muted">※ ひらがなで入力してください。</div>
      <div class="controls"><button class="primary" id="checkBtn">答え合わせ</button><button class="secondary hidden" id="nextBtn">次の問題へ</button><button class="ghost" id="restartBtn">最初に戻る</button></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="card hidden" id="resultCard">
      <h2>結果</h2>
      <div id="resultStudent"></div>
      <div class="score" id="scoreText"></div>
      <div class="muted">まちがえた問題は下で確認できます。</div>
      <ol class="resultList" id="mistakeList"></ol>
      <div class="controls"><button class="primary" id="retryWrongBtn">まちがえた問題だけもう一度</button><button class="secondary" id="newQuizBtn">新しくやり直す</button></div>
    </div>
  </div>
</div>
<script>
const WORDS = [
{kanji:"展望",reading:"てんぼう",jp:"これからどうなるかについての見通し。",zh:"展望，前景",vi:"triển vọng",en:"outlook; prospect"},
{kanji:"公表",reading:"こうひょう",jp:"みんなに知らせること。",zh:"公布，发表",vi:"công bố",en:"announcement; publication"},
{kanji:"探究",reading:"たんきゅう",jp:"深く調べて考えること。",zh:"探究",vi:"nghiên cứu, tìm tòi",en:"inquiry; exploration"},
{kanji:"分析",reading:"ぶんせき",jp:"分けて、くわしく調べること。",zh:"分析",vi:"phân tích",en:"analysis"},
{kanji:"考察",reading:"こうさつ",jp:"よく考えて、意味や理由を調べること。",zh:"考察",vi:"khảo sát, xem xét",en:"consideration; examination"},
{kanji:"再構築",reading:"さいこうちく",jp:"もう一度作り直すこと。",zh:"重新构建",vi:"tái cấu trúc",en:"reconstruction"},
{kanji:"機会",reading:"きかい",jp:"何かをするのによい時。",zh:"机会",vi:"cơ hội",en:"opportunity"},
{kanji:"指摘",reading:"してき",jp:"問題や大切な点を言うこと。",zh:"指出",vi:"chỉ ra",en:"pointing out"},
{kanji:"依存",reading:"いぞん",jp:"それがないとだめになるほど頼ること。",zh:"依赖",vi:"phụ thuộc",en:"dependence"},
{kanji:"陥る",reading:"おちいる",jp:"悪い状態になる。",zh:"陷入",vi:"rơi vào",en:"fall into"},
{kanji:"汎用的",reading:"はんようてき",jp:"広くいろいろな場面で使えるようす。",zh:"通用的，通用型的",vi:"mang tính đa dụng",en:"general-purpose"},
{kanji:"直感的",reading:"ちょっかんてき",jp:"深く考える前にすぐわかるようす。",zh:"直观的",vi:"mang tính trực quan",en:"intuitive"},
{kanji:"普及",reading:"ふきゅう",jp:"広く使われるようになること。",zh:"普及",vi:"phổ biến",en:"spread; diffusion"},
{kanji:"機関",reading:"きかん",jp:"ある目的のために作られた組織。",zh:"机构",vi:"cơ quan, tổ chức",en:"institution; organization"},
{kanji:"制御",reading:"せいぎょ",jp:"動きや働きを思ったとおりに調整すること。",zh:"控制",vi:"điều khiển, kiểm soát",en:"control"},
{kanji:"状況",reading:"じょうきょう",jp:"そのときのようす。",zh:"状况",vi:"tình hình",en:"situation"},
{kanji:"拡大",reading:"かくだい",jp:"大きく広がること。",zh:"扩大",vi:"mở rộng",en:"expansion"},
{kanji:"同時",reading:"どうじ",jp:"同じ時。",zh:"同时",vi:"đồng thời",en:"simultaneous"},
{kanji:"課題",reading:"かだい",jp:"解決したり、取り組んだりする問題。",zh:"课题",vi:"nhiệm vụ, vấn đề",en:"task; issue"},
{kanji:"向上",reading:"こうじょう",jp:"前よりよくなること。",zh:"提高",vi:"nâng cao",en:"improvement"},
{kanji:"可能性",reading:"かのうせい",jp:"そうなるかもしれない見込み。",zh:"可能性",vi:"khả năng",en:"possibility"},
{kanji:"構成",reading:"こうせい",jp:"組み立て方。",zh:"构成",vi:"cấu thành",en:"composition; structure"},
{kanji:"推論",reading:"すいろん",jp:"わかっていることから考えて答えを出すこと。",zh:"推论",vi:"suy luận",en:"inference"},
{kanji:"メタ認知",reading:"めたにんち",jp:"自分の考え方や学び方を自分で見て考えること。",zh:"元认知",vi:"siêu nhận thức",en:"metacognition"},
{kanji:"任せる",reading:"まかせる",jp:"自分でしないで、ほかの人やものにしてもらう。",zh:"交给，委托",vi:"giao cho",en:"leave to; entrust"},
{kanji:"成果",reading:"せいか",jp:"努力して得られたよい結果。",zh:"成果",vi:"thành quả",en:"result; achievement"},
{kanji:"長期的",reading:"ちょうきてき",jp:"長い時間を考えたようす。",zh:"长期的",vi:"mang tính dài hạn",en:"long-term"},
{kanji:"学力",reading:"がくりょく",jp:"勉強して身につけた力。",zh:"学力",vi:"năng lực học tập",en:"academic ability"},
{kanji:"遂行",reading:"すいこう",jp:"最後までやりとげること。",zh:"遂行",vi:"thực hiện hoàn thành",en:"accomplishment; execution"},
{kanji:"認知",reading:"にんち",jp:"知って理解すること。",zh:"认知",vi:"nhận thức",en:"cognition; recognition"},
{kanji:"怠惰",reading:"たいだ",jp:"なまけて、しっかりしないようす。",zh:"懒惰",vi:"lười biếng",en:"laziness"},
{kanji:"無関心",reading:"むかんしん",jp:"関心がないこと。",zh:"漠不关心",vi:"thờ ơ",en:"indifference"},
{kanji:"逆転",reading:"ぎゃくてん",jp:"立場や結果が反対になること。",zh:"逆转",vi:"đảo ngược",en:"reversal"},
{kanji:"教育的",reading:"きょういくてき",jp:"学びに役立つようす。",zh:"教育性的",vi:"mang tính giáo dục",en:"educational"},
{kanji:"意図的",reading:"いとてき",jp:"考えや目的をもってするようす。",zh:"有意图地，故意地",vi:"có chủ ý",en:"intentional"},
{kanji:"最適",reading:"さいてき",jp:"いちばん合っていて、いちばんよいこと。",zh:"最适合",vi:"tối ưu",en:"optimal"},
{kanji:"自己調整",reading:"じこちょうせい",jp:"自分で考えて自分を整えること。",zh:"自我调节",vi:"tự điều chỉnh",en:"self-regulation"},
{kanji:"対話型",reading:"たいわがた",jp:"話し合いながら進める形。",zh:"对话型",vi:"dạng đối thoại",en:"interactive; dialogue-based"},
{kanji:"協働",reading:"きょうどう",jp:"力を合わせていっしょにすること。",zh:"协作",vi:"cộng tác",en:"collaboration"},
{kanji:"知識深化",reading:"ちしきしんか",jp:"知識をもっと深くすること。",zh:"知识深化",vi:"làm sâu sắc kiến thức",en:"deepening of knowledge"},
{kanji:"議論力",reading:"ぎろんりょく",jp:"自分の考えを出し合って話し合う力。",zh:"讨论能力",vi:"năng lực thảo luận",en:"discussion skills"},
{kanji:"可視化",reading:"かしか",jp:"見えないものを見える形にすること。",zh:"可视化",vi:"trực quan hóa",en:"visualization"},
{kanji:"補完",reading:"ほかん",jp:"足りないところをおぎなうこと。",zh:"补充，补完",vi:"bổ sung",en:"complement; supplementation"},
{kanji:"単独",reading:"たんどく",jp:"一つだけ、または一人だけですること。",zh:"单独",vi:"đơn lẻ",en:"alone; single-handed"},
{kanji:"達成",reading:"たっせい",jp:"目標をやりとげること。",zh:"达成",vi:"đạt được",en:"achievement"},
{kanji:"評価項目",reading:"ひょうかこうもく",jp:"評価するときに見る点。",zh:"评价项目",vi:"hạng mục đánh giá",en:"evaluation item"},
{kanji:"整合性",reading:"せいごうせい",jp:"前と後、全体がきちんと合っていること。",zh:"一致性，整合性",vi:"tính nhất quán",en:"consistency"},
{kanji:"分類",reading:"ぶんるい",jp:"種類ごとに分けること。",zh:"分类",vi:"phân loại",en:"classification"},
{kanji:"利活用",reading:"りかつよう",jp:"役に立つように使うこと。",zh:"利用与活用",vi:"tận dụng và sử dụng",en:"practical use; utilization"},
{kanji:"枠組み",reading:"わくぐみ",jp:"全体の組み立てや基本の形。",zh:"框架",vi:"khung",en:"framework"}
];

const tabBtns=document.querySelectorAll('.tabBtn'); const panels=document.querySelectorAll('.panel');
tabBtns.forEach(btn=>btn.addEventListener('click',()=>{tabBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');panels.forEach(p=>p.classList.add('hidden'));const target=document.getElementById(btn.dataset.target);target.classList.remove('hidden');target.scrollIntoView({behavior:'smooth',block:'start'});}));

const vocabGrid=document.getElementById('vocabGrid');
function renderVocab(list){vocabGrid.innerHTML=''; list.forEach((w,i)=>{const div=document.createElement('div'); div.className='vocabItem'; div.innerHTML=`<button class="vocabHeader" type="button"><span>${i+1}. ${w.kanji}</span><span>タップでひらく</span></button><div class="vocabBody"><div class="meaningBlock"><div class="meaningLabel">読み</div><div>${w.reading}</div></div><div class="meaningBlock"><div class="meaningLabel">やさしい日本語</div><div>${w.jp}</div></div><div class="meaningBlock"><div class="meaningLabel">中国語</div><div>${w.zh}</div></div><div class="meaningBlock"><div class="meaningLabel">ベトナム語</div><div>${w.vi}</div></div><div class="meaningBlock"><div class="meaningLabel">英語</div><div>${w.en}</div></div></div>`; div.querySelector('.vocabHeader').addEventListener('click',()=>div.classList.toggle('open')); vocabGrid.appendChild(div);});}
renderVocab(WORDS);
document.getElementById('searchInput').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase(); const filtered=WORDS.filter(w=>Object.values(w).some(v=>String(v).toLowerCase().includes(q))); renderVocab(filtered);});
document.getElementById('openAllBtn').addEventListener('click',()=>document.querySelectorAll('.vocabItem').forEach(x=>x.classList.add('open')));
document.getElementById('closeAllBtn').addEventListener('click',()=>document.querySelectorAll('.vocabItem').forEach(x=>x.classList.remove('open')));

const startBtn=document.getElementById('startBtn'),quizCard=document.getElementById('quizCard'),resultCard=document.getElementById('resultCard'),questionText=document.getElementById('questionText'),progress=document.getElementById('progress'),answerInput=document.getElementById('answerInput'),checkBtn=document.getElementById('checkBtn'),nextBtn=document.getElementById('nextBtn'),restartBtn=document.getElementById('restartBtn'),feedback=document.getElementById('feedback'),studentInfo=document.getElementById('studentInfo'),resultStudent=document.getElementById('resultStudent'),scoreText=document.getElementById('scoreText'),mistakeList=document.getElementById('mistakeList'),retryWrongBtn=document.getElementById('retryWrongBtn'),newQuizBtn=document.getElementById('newQuizBtn');
let quizItems=[],currentIndex=0,score=0,checked=false,mistakes=[];
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
function normalize(t){return (t||'').trim().replace(/\s+/g,'')}
function buildQuiz(items){quizItems=items;currentIndex=0;score=0;checked=false;mistakes=[];resultCard.classList.add('hidden');quizCard.classList.remove('hidden');renderQuestion();answerInput.focus()}
function startQuizFromSettings(){const sid=document.getElementById('studentId').value.trim(),sname=document.getElementById('studentName').value.trim(),count=Number(document.getElementById('questionCount').value),mode=document.getElementById('mode').value;studentInfo.textContent=`学籍番号：${sid||'未入力'}　／　名前：${sname||'未入力'}`;resultStudent.textContent=studentInfo.textContent;let items=mode==='random'?shuffle(WORDS):[...WORDS];buildQuiz(items.slice(0,count))}
function renderQuestion(){const item=quizItems[currentIndex];questionText.textContent=item.kanji;progress.textContent=`第${currentIndex+1}問 / ${quizItems.length}`;answerInput.value='';checked=false;feedback.className='feedback';feedback.textContent='';nextBtn.classList.add('hidden');checkBtn.disabled=false}
function checkAnswer(){if(checked)return;const item=quizItems[currentIndex],user=normalize(answerInput.value),correct=normalize(item.reading);if(!user){feedback.className='feedback ng';feedback.textContent='こたえを入力してください。';return}checked=true;checkBtn.disabled=true;nextBtn.classList.remove('hidden');if(user===correct){score++;feedback.className='feedback ok';feedback.textContent=`〇 正解です！「${item.kanji}」は「${item.reading}」です。`}else{mistakes.push(item);feedback.className='feedback ng';feedback.textContent=`× ちがいます。正解は「${item.reading}」です。`}}
function nextQuestion(){if(!checked)return;currentIndex++;if(currentIndex>=quizItems.length){showResults();return}renderQuestion();answerInput.focus()}
function showResults(){quizCard.classList.add('hidden');resultCard.classList.remove('hidden');scoreText.textContent=`${quizItems.length}問中 ${score}問正解`;mistakeList.innerHTML='';if(mistakes.length===0){const li=document.createElement('li');li.textContent='全問正解です。すばらしいです。';mistakeList.appendChild(li);retryWrongBtn.disabled=true}else{retryWrongBtn.disabled=false;mistakes.forEach(item=>{const li=document.createElement('li');li.textContent=`${item.kanji} → ${item.reading}`;mistakeList.appendChild(li)})}}
startBtn.addEventListener('click',startQuizFromSettings);checkBtn.addEventListener('click',checkAnswer);nextBtn.addEventListener('click',nextQuestion);restartBtn.addEventListener('click',()=>{quizCard.classList.add('hidden');resultCard.classList.add('hidden');window.scrollTo({top:0,behavior:'smooth'})});retryWrongBtn.addEventListener('click',()=>{if(mistakes.length>0)buildQuiz(shuffle(mistakes))});newQuizBtn.addEventListener('click',()=>{resultCard.classList.add('hidden');window.scrollTo({top:0,behavior:'smooth'})});answerInput.addEventListener('keydown',e=>{if(e.key==='Enter'){if(!checked)checkAnswer();else nextQuestion();}});
</script>
</body>
</html>
